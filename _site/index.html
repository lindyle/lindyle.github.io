<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- Primary Meta Tags -->
    <title>Lindy Le</title>
    <meta name="title" content="Lindy Le" />

      name="description"
      content="Lindy's Portfolio Website"
    />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://lindyle.github.io/"
    />
    <meta property="og:title" content="Lindy Le" />

      property="og:description"
      content="Lindy's Portfolio Website"
    />
    <meta
      property="og:image"
      content="assets/favicon/apple-touch-icon.png"
    />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta
      property="twitter:url"
      content="https://lindyle.github.io/"
    />
    <meta property="twitter:title" content="Lindy Le" />
    <meta
      property="twitter:description"
      content="Lindy's Portfolio Website"
    />

      property="twitter:image"

    />

    <!-- Link -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"

    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/assets/favicon/favicon-16x16.png"

    />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="assets/favicon/android-chrome-192x192.png"
    />
    <link
      rel="icon"

      sizes="512x512"

    <link rel="manifest" href="assets/favicon/site.webmanifest" />
    <link

      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/utilities.css" />
    <script src="//ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js" type="text/javascript"></script>
    <script src="js/script.js"></script>
  </head>
  <body>
    <header id="hero">
      <!-- Navbar -->
      <nav class="navbar">
        <div class="container">
          <!-- Logo -->
          <h1 id="logo">
            <a href="https://lindyle.github.io/"
              ><img src="./assets/logo.png" alt="Lindy's Logo"
            /></a>
          </h1>
          <!-- Navbar links -->
          <ul class="nav-menu">
            <li><a class="nav-link" href="#projects">PROJECTS</a></li>
            <li><a class="nav-link" href="#">PUBLICATIONS</a></li>
            <li><a class="nav-link" href="#">ART</a></li>
            <li><a class="nav-link" href="#">ABOUT</a></li>
            <li>
              <a
                class="nav-link btn btn-primary"
                href=""
                >CV <i class="fas fa-arrow-right"></i
              ></a>
            </li>

            <!-- Toggle switch -->
            <div class="theme-switch">
              <input type="checkbox" id="switch" />
              <label class="toggle-icons" for="switch">
                <img class="moon" src="assets/moon.svg" />
                <img class="sun" src="assets/sun.svg" class="svg-filter"/>
              </label>
            </div>
            <!-- Hamburger menu -->
          </ul>
          <div class="hamburger">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
          </div>
        </div>
      </nav>

      <!-- Header (About Me) -->
      <section id="about" class="header-container">
        <img
          class="profile-image"
          src="assets/profile-image.png"
          alt="Lindy's Avatar"
        />
        <h1>Hi, I'm Lindy.</h1>
        
        <div class="content-text">
          <h2 id="intro-h2">Neurodiversity · Empathy · Accessibility</h2>
    
          <p>
            A Frontend Developer and Visual Designer with experience in web
            design, brand identity and product design.
          </p>
        </div>
        <a
          href="mailto:lindyrose.le@gmail.com"
          class="btn btn-secondary"
          target="_blank"
          >Let's Chat!</a
        >
      </section>

    <!-- Main -->
    <section id="main"></section>

    <footer id="foot"></footer>
